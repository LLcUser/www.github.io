<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>扫码查询</title>
     <!-- 预加载优化 -->
<link rel="preconnect" href="https://LLcUser.github.io">
<link rel="dns-prefetch" href="https://LLcUser.github.io">

<!-- 强制浏览器缓存 -->
<meta http-equiv="Cache-Control" content="max-age=86400, public">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
            img {
        content-visibility: auto;
        contain-intrinsic-size: 0 500px;
       }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
        }
        
        .header {
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }
        
        .icon {
            font-size: 24px;
            color: #333;
            width: 30px;
            text-align: center;
        }
        
        .title {
            text-align: center;
        }
        
        .title-main {
            display: block;
            font-size: 18px;
            color: #333;
        }
        
        .title-sub {
            display: block;
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }
        
        .gradient-bg {
            background: linear-gradient(180deg, #2185d0 0%, #ffffff 50%);
            min-height: 100vh;
            padding-bottom: 30px;
        }
        
        .banner-text {
            color: #fff;
            text-align: center;
            padding: 25px 0 20px;
            font-size: 24px;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .content {
            padding: 0 20px;
        }
        
        .unified-card {
            position:relative;
            background-color: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        
        .front-section {
            margin-bottom: 20px;
        }
        
        .front-img {
            width: 100%;
            border-radius: 12px;
            background-color: #f5f5f5;
            display: block;
        }
        
        .back-section {
            margin-bottom: 30px;
        }
        
        .back-img {
            width: 100%;
            border-radius: 12px;
            background-color: #f5f5f5;
            display: block;
        }
        
        .divider {
            height: 1px;
            margin: 20px 0;
        }
        
        .remark-section {
            position: absolute;
            left: 10px;
            bottom: 5px;
            border-radius: 12px;
        }
        
        .remark-text {
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }
        
        .footer {
            text-align: center;
            padding: 20px 0 15px;
        }
        
        .footer-text {
            display: block;
            font-size: 11px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 4px;
        }
        
        .nav {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            background-color: #fff;
            border-radius: 30px;
            margin-top: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        
        .arrow {
            font-size: 24px;
            color: #666;
            cursor: pointer;
        }
        
        /* 图片占位提示 */
        .front-img:not([src]), .back-img:not([src]) {
            min-height: 200px;
            background: linear-gradient(135deg, #f0f0f0 0%, #e0e0e0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .front-img:not([src])::after {
            content: "📷 点击此处添加证件正面图片";
            position: absolute;
            color: #999;
            font-size: 14px;
            text-align: center;
        }
        
        .back-img:not([src])::after {
            content: "📷 点击此处添加证件反面图片";
            position: absolute;
            color: #999;
            font-size: 14px;
            text-align: center;
        }
        .wdf{
            margin-top:30px;
        }
    </style>
</head>
<body>


    <div class="gradient-bg">
        <div class="banner-text">证书扫码结果</div>

        <div class="content">
            <div class="unified-card">
                <div class="wdf"></div>
                <!-- 证件正面 -->
                <div class="front-section">
                    <img class="front-img" src="https://LLcUser.github.io/images/zhengmian.png" alt="证件正面">
                </div>

                <div class="divider">

                </div>

                <!-- 证件反面 -->
                <div class="back-section">
                    <img class="back-img" src="https://LLcUser.github.io/images/fanmian.png" alt="证件反面">
                </div>
                
                <!-- 备注文字 -->
                <div class="remark-section">
                    <div class="remark-text">备注：本证书已于2024-04-15在天津市应急管理局完成复审。请于2027-04-13前进行延期换证。</div>
                </div>
            </div>

            <div class="footer">
                <span class="footer-text">主办单位：中华人民共和国应急管理部</span>
                <span class="footer-text">承办单位：应急管理部干部培训学院（应急管理部党校）</span>
                <span class="footer-text">备案号：京ICP备18056520号-2</span>
            </div>

            <div class="nav">
                <span class="arrow">←</span>
                <span class="arrow">→</span>
            </div>
        </div>
    </div>
</body>
</html>
